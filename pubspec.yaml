name: benchmark_harness
version: 2.0.0-nullsafety.0
author: Dart Team <misc@dartlang.org>
description: The official Dart project benchmark harness.
homepage: https://github.com/dart-lang/benchmark_harness

environment:
  sdk: '>=2.12.0-0 <3.0.0'

dependencies:
  analyzer: ^0.41.1
  ansicolor: ^1.1.1
  args: ^1.6.0
  build: ^1.6.0
  dcli: ^0.50.0-nullsaftey.0
  ffi: ^0.1.3
  source_gen: ^0.9.10+1
  stats: ^1.0.1
  # Depend on unreleased version of native_stack_traces.
  native_stack_traces:
    path: ../../dart/sdk/pkg/native_stack_traces
  dart_internal:
    path: ./dart_internal

dev_dependencies:
  build_runner: ^1.1.0
  build_web_compilers: '>=1.0.0 <3.0.0'
  path: ^1.8.0-nullsafety
  pedantic: ^1.10.0-nullsafety
  test: ^1.16.0-nullsafety
